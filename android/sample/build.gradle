plugins {
    id "com.android.application"
}

android {
    namespace "id.ktpncnn.sample"
    compileSdk 35

    defaultConfig {
        applicationId "id.ktpncnn.sample"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

dependencies {
    implementation project(":library")
}
