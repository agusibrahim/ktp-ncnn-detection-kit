plugins {
    id "com.android.library"
}

android {
    namespace "id.ktpncnn.library"
    compileSdk 35

    defaultConfig {
        minSdk 24
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
                cppFlags "-O3 -fopenmp -fno-rtti"
            }
        }
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}
