name: Build Android, Web, and Pages

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download NCNN Android SDK
        working-directory: android
        run: ./scripts/setup_ncnn_android.sh

      - name: Build AAR and APK
        working-directory: android
        run: ./gradlew :library:assembleRelease :sample:assembleRelease

      - name: Collect Android artifacts
        run: |
          mkdir -p dist
          cp android/library/build/outputs/aar/library-release.aar dist/ktp-ncnn-library.aar
          cp android/sample/build/outputs/apk/release/sample-release.apk dist/ktp-ncnn-sample.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: dist/*

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check web/app.js
          node --check web/ktp-detector.js

      - name: Package Web WASM sample
        run: |
          mkdir -p dist
          zip -r dist/ktp-ncnn-web-wasm.zip web

      - uses: actions/upload-artifact@v4
        with:
          name: web-wasm
          path: dist/ktp-ncnn-web-wasm.zip

  pages:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [android, web]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p dist
          find artifacts -maxdepth 3 -type f -exec cp {} dist/ \;
          ls -lah dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
